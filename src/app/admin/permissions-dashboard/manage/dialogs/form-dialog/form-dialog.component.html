<div class="flex flex-col" style="min-width:460px; max-width:520px">

  <!-- Dialog header -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-cm-border">
    <h3 class="text-base font-bold text-cm-text-primary">{{ dialogTitle }}</h3>
    <button mat-dialog-close type="button"
      class="w-8 h-8 rounded-lg flex items-center justify-center text-cm-text-muted
             hover:text-cm-text-primary hover:bg-cm-surface-hover active:scale-95 transition-all">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Form body -->
  <div class="px-5 py-4">
    <form [formGroup]="permissionsForm" (ngSubmit)="submit()">

      @if (errorMessage) {
      <div class="rounded-xl bg-cm-danger-dim border border-cm-danger/20 px-4 py-3 text-sm text-cm-danger-text mb-4">
        {{ errorMessage }}
      </div>
      }

      <!-- Permission multi-select — grouped, since /apis/permissions/master-permissions
           returns [{ group, permissions[] }], not a flat permission list -->
      <div class="mb-4">
        <label class="block text-xs font-medium text-cm-text-secondary mb-1.5">Select Permission</label>
        <app-searchable-select
          formControlName="permissionIds"
          [multiple]="true"
          [options]="permissionOptions"
          [loading]="permissionsLoading"
          placeholder="Select one or more permissions"
          searchPlaceholder="Search permissions…"
          emptyText="No permissions available.">
        </app-searchable-select>
      </div>

      <!-- User select -->
      <div class="mb-4">
        <label class="block text-xs font-medium text-cm-text-secondary mb-1.5">Select User</label>
        <app-searchable-select
          formControlName="userId"
          [options]="userOptions"
          placeholder="Select a user"
          searchPlaceholder="Search users…"
          emptyText="No users available.">
        </app-searchable-select>
      </div>

      <!-- Resource type — optional; only meaningful for scoped permissions -->
      <div class="mb-4">
        <label class="block text-xs font-medium text-cm-text-secondary mb-1.5">Resource Type (optional)</label>
        <app-searchable-select
          formControlName="resourceType"
          [options]="resourceTypeOptions"
          placeholder="Global (no specific resource)"
          searchPlaceholder="Search resource types…">
        </app-searchable-select>
      </div>

      <!-- Resource — only shown once a resource type is picked -->
      @if (showResourcePicker) {
      <div class="mb-5">
        <label class="block text-xs font-medium text-cm-text-secondary mb-1.5">Select Resource</label>
        <app-searchable-select
          formControlName="resourceId"
          [options]="resourceOptions"
          placeholder="Select a resource"
          searchPlaceholder="Search…"
          emptyText="No resources available.">
        </app-searchable-select>
      </div>
      }

      <!-- Actions -->
      <div class="flex items-center gap-3 pt-1">
        <button type="submit" [disabled]="!permissionsForm.valid"
          class="inline-flex items-center px-5 py-2.5 rounded-xl bg-cm-brand text-white text-sm font-semibold
                 hover:opacity-90 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
          {{ action === 'edit' ? 'Update Permission' : 'Grant Permission' }}
        </button>
        <button type="button" (click)="permissionsForm.reset()"
          class="inline-flex items-center px-5 py-2.5 rounded-xl border border-cm-border
                 text-sm font-medium text-cm-text-secondary bg-cm-surface-muted
                 hover:border-cm-danger/40 hover:text-cm-danger-text active:scale-95 transition-all">
          Reset
        </button>
      </div>

    </form>
  </div>

</div>
