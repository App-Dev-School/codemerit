<div class="quiz-builder-container">
  <!-- Stepper Header -->
  <div class="stepper-header">
    <div class="step" [class.active]="currentStep === 0" [class.completed]="currentStep > 0">
      <div class="step-circle">
        @if (currentStep > 0) {
          <mat-icon>check</mat-icon>
        } @else {
          1
        }
      </div>
      <span class="step-label">Quiz Info</span>
    </div>
    <div class="step-connector" [class.active]="currentStep >= 1"></div>
    <div class="step" [class.active]="currentStep === 1" [class.completed]="currentStep > 1">
      <div class="step-circle">
        @if (currentStep > 1) {
          <mat-icon>check</mat-icon>
        } @else {
          2
        }
      </div>
      <span class="step-label">Questions</span>
    </div>
    <div class="step-connector" [class.active]="currentStep >= 2"></div>
    <div class="step" [class.active]="currentStep === 2">
      <div class="step-circle">3</div>
      <span class="step-label">Settings</span>
    </div>
  </div>

  <!-- Stepper Content -->
  <div class="builder-content">
    @if (currentStep === 0) {
      <div class="step-content" style="max-width: 600px; margin: 0 auto">
        <app-quiz-form
          (formSubmitted)="onQuizFormSubmit($event)"
          [formData]="quizFormData"
        ></app-quiz-form>
      </div>
    }
    @if (currentStep === 1) {
      <div class="step-content">
        <app-quiz-questions-form
          [mode]="'quiz-builder'"
          (questionsAdded)="onQuestionsAdded($event)"
          (filtersApplied)="onFiltersApplied($event)"
          [initialFilters]="quizFiltersData"
          [selectedQuestions]="quizQuestionsData"
          [subjects]="subjects"
          [topics]="topics"
          [questions]="allQuestions"
        ></app-quiz-questions-form>
      </div>
    }
    @if (currentStep === 2) {
      <div class="step-content" style="max-width: 500px; margin: 0 auto">
        <app-quiz-settings-form
          (formSubmitted)="onSettingsFormSubmit($event)"
          [initialSettings]="quizSettingsData"
        ></app-quiz-settings-form>
      </div>
    }
  </div>

  <!-- Stepper Actions -->
  <div class="stepper-actions">
    <button
      mat-stroked-button
      color="primary"
      (click)="prevStep()"
      [disabled]="currentStep === 0"
    >
      <mat-icon>keyboard_arrow_left</mat-icon>
      Previous
    </button>
    <span class="flex-grow"></span>
    @if (currentStep < 2) {
      <button
        mat-flat-button
        color="accent"
        (click)="nextStep()"
        [disabled]="!canProceedToNext"
      >
        Next
        <mat-icon>keyboard_arrow_right</mat-icon>
      </button>
    }
    @if (currentStep === 2) {
      <button
        mat-flat-button
        color="primary"
        (click)="editMode ? editQuiz() : publishQuiz()"
        [disabled]="!allStepsValid || loading"
      >
        @if (loading) {
          <mat-icon class="spin">sync</mat-icon>
          {{ editMode ? 'Updating...' : 'Publishing...' }}
        } @else {
          <mat-icon>{{ editMode ? 'edit' : 'publish' }}</mat-icon>
          {{ editMode ? 'Edit Quiz' : 'Publish Quiz' }}
        }
      </button>
    }
  </div>
</div>
