<div class="quiz-result-container">
  <div class="content-block">
    @if (loading) {
    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[1000]"></div>
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[1001]
                bg-cm-surface rounded-3xl p-8 text-center
                shadow-2xl flex flex-col items-center gap-4 min-w-[min(90%,320px)]">
      <div class="w-10 h-10 rounded-full border-2 border-cm-surface-raised
                  border-t-cm-brand border-r-cm-brand animate-spin"></div>
      <div>
        <p class="text-md font-bold text-cm-text-primary">Loading Result</p>
        <p class="text-xs text-cm-text-muted mt-0.5">Please wait while we fetch this assessment record</p>
      </div>
    </div>
    }
    @if (quizResult) {
    <app-quiz-result [result]="quizResult" [newlyEarned]="newlyEarned" [heroSubject]="heroSubject"
      [badges]="badges" [leaderboardTeaser]="leaderboardTeaser" [tryNextSubjects]="tryNextSubjects"
      [nextCertificationTrack]="nextCertificationTrack" [nextSubjectTrack]="nextSubjectTrack"
      (onShareResult)="onShareResult()" (onContinue)="onContinue()"></app-quiz-result>
    }
  </div>
</div>
