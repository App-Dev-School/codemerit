<div class="relative rounded-2xl overflow-hidden border border-cm-border bg-cm-surface p-6 text-center">
  <img src="assets/images/widgets/decore-left.png" class="absolute left-0 top-0 w-24 opacity-10 pointer-events-none select-none" alt="" />
  <img src="assets/images/widgets/decore-right.png" class="absolute right-0 top-0 w-24 opacity-10 pointer-events-none select-none" alt="" />
  <div class="relative">
    <div class="w-14 h-14 rounded-full bg-cm-brand-dim flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-cm-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
      </svg>
    </div>
    <h5 class="text-base font-bold text-cm-text-primary mb-2">Welcome {{user?.firstName ?? 'Guest'}}</h5>
    <p class="text-xs text-cm-text-secondary leading-relaxed mb-4 max-w-xs mx-auto">{{message}}</p>
    <hr class="border-cm-border mb-4">
    <button (click)="handleAction()"
      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl border-2 border-cm-brand text-cm-brand
             text-sm font-semibold hover:bg-cm-brand hover:text-white active:scale-95 transition-all floating">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
      </svg>
      Select your Job Role
    </button>
  </div>
</div>
