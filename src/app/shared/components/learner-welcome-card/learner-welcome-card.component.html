<div class="card">
    <div class="body">
        <div class="row align-items-center">
            <div class="col-md-8 mb-0">
                <div class="font-b-500 font-25 col-blue mb-2">{{ isVisitor ? 'Welcome Guest' : 'Welcome back'}}
                </div>
                <p class="font-b-500 mb-4">Start by creating a job profile that matches your career aspirations. This
                    helps us personalize your assessments, certify your skills, and help connect you with opportunities
                    . </p>
                <div class="row justify-content-center">
                    <div class="col-lg-4 col-sm-4">
                        <div class="p-15 m-10 card-1">
                            <h5 class="m-t-20 mb-0 text-primary">Add Job Profile </h5>
                        </div>
                    </div>
                    <div class="col-lg-4 col-sm-4">
                        <div class="p-15 m-10 card-2">
                            <h5 class="m-t-20 mb-0 text-danger">Take Assessment </h5>
                        </div>
                    </div>
                    <div class="col-lg-4 col-sm-4">
                        <div class="p-15 m-10 card-3">
                            <h5 class="m-t-20 mb-0 text-success">Finish Onboarding </h5>
                        </div>
                    </div>
                    <div>
                        <button mat-flat-button class="adminBtn" (click)="login()">
                            Visit Home <mat-icon>keyboard_arrow_right</mat-icon>
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-0">
                <div class="animSvg" style="width:100%;height:300px;"></div>
                <!-- <img src="assets/images/pages/onboard.svg" alt="" class="w-100 image-top">
                 <img src="assets/images/pages/3.svg" alt="" class="w-100 image-top"> -->
            </div>
        </div>
    </div>
</div>
