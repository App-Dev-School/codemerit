<div class="star-rating">
   @for (star of stars; track $index; let i = $index) {
  <ng-container>
    <span
      class="star"
      [class.filled]="(hovered || rating) > i"
      (click)="setRating(i + 1)"
      (mouseenter)="hovered = i + 1"
      (mouseleave)="hovered = 0"
    >
      ★
    </span>
  </ng-container>
}
</div>
