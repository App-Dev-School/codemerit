@if(achievements?.length > 0){

<div class="flex gap-5 overflow-x-auto pb-2 badge-scroll">

  @for(badge of achievements; let i = $index; track badge){

  <div class="badge-item flex-none flex flex-col items-center gap-3 cursor-default group"
       style="width: 108px">

    <!-- Badge image with ambient glow -->
    <div class="relative w-[72px] h-[72px]">
      <div class="absolute inset-0 rounded-full scale-[2.4] blur-2xl opacity-0
                  group-hover:opacity-60 transition-opacity duration-500"
           [style.backgroundColor]="getTier(i).glow"></div>
      <div class="relative w-[72px] h-[72px] rounded-2xl bg-cm-surface-raised border border-cm-border
                  flex items-center justify-center overflow-hidden
                  group-hover:border-cm-border-strong transition-colors duration-300">
        <img [src]="badge.imgSrc" [alt]="badge.name"
             class="w-12 h-12 object-contain drop-shadow-md
                    group-hover:scale-110 transition-transform duration-300">
      </div>
    </div>

    <!-- Tier chip -->
    <span class="inline-flex items-center gap-1 px-2.5 py-[3px] rounded-full
                 text-[9px] font-black uppercase tracking-widest"
          [style.color]="getTier(i).ring"
          [style.backgroundColor]="getTier(i).glow">
      ★ {{getTier(i).label}}
    </span>

    <!-- Badge name -->
    <p class="text-[11px] font-bold text-cm-text-primary text-center leading-tight line-clamp-2 px-1">
      {{badge.name}}
    </p>

    <!-- Earned timestamp -->
    <p class="text-[10px] text-cm-text-muted text-center leading-snug -mt-1">
      {{badge.timestamp}}
    </p>

  </div>
  }

</div>

}@else{

<!-- Empty state -->
<div class="flex flex-col items-center justify-center py-10 gap-4 text-center">
  <div class="w-16 h-16 rounded-2xl bg-cm-surface-raised border border-cm-border
              flex items-center justify-center">
    <span class="text-3xl">🎖️</span>
  </div>
  <div>
    <p class="text-sm font-bold text-cm-text-primary">No badges yet</p>
    <p class="text-xs text-cm-text-muted mt-1 max-w-[220px]">
      Complete assessments and milestones to earn your first credential
    </p>
  </div>
</div>

}
