<div class="rounded-xl border border-cm-border bg-cm-surface p-4 mb-4 hover:bg-cm-surface-hover transition-colors">
  <p class="text-sm font-semibold text-cm-text-primary mb-3">{{ heading() }}</p>
  <div class="grid grid-cols-3 gap-2 mb-4">
    <div class="text-center">
      <p class="text-xs text-cm-text-muted mb-0.5">Today</p>
      <p class="text-lg font-bold text-cm-text-primary">{{ todayCount() }}</p>
    </div>
    <div class="text-center">
      <p class="text-xs text-cm-text-muted mb-0.5">This Week</p>
      <p class="text-lg font-bold text-cm-text-primary">{{ weekCount() }}</p>
    </div>
    <div class="text-center">
      <p class="text-xs text-cm-text-muted mb-0.5">This Month</p>
      <p class="text-lg font-bold text-cm-text-primary">{{ monthCount() }}</p>
    </div>
  </div>
  <div class="w-full h-1.5 bg-cm-surface-raised rounded-full overflow-hidden">
    <div class="h-full rounded-full transition-all duration-500"
         [style.width]="progressPercentage() + '%'"
         [style.backgroundColor]="progressColor()"></div>
  </div>
</div>
