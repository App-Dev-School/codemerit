<form [formGroup]="settingsForm">

  <!-- Section header -->
  <div class="sf-header">
    <h4 class="text-sm font-bold text-cm-text-primary">Customize &amp; Publish</h4>
    <p class="text-xs text-cm-text-muted mt-0.5">Configure how the quiz is presented to learners</p>
  </div>

  <!-- Settings rows -->
  <div class="sf-rows">

    <!-- Quiz Mode -->
    <div class="sf-row">
      <div class="sf-row-label">
        <i class="fa-solid fa-sliders text-indigo-400 text-[14px] w-4 text-center shrink-0"></i>
        <div>
          <p class="sf-row-title">Quiz Mode</p>
        </div>
      </div>
      <div class="sf-seg">
        @for (option of modeOptions; track option.value) {
          <button type="button"
                  (click)="settingsForm.get('mode')?.setValue(option.value)"
                  [class]="settingsForm.get('mode')?.value === option.value
                    ? 'px-3.5 py-1.5 font-bold text-white bg-indigo-500 transition-colors'
                    : 'px-3.5 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
            {{ option.label }}
          </button>
        }
      </div>
    </div>

    <!-- Enable Hints -->
    <div class="sf-row">
      <div class="sf-row-label">
        <i class="fa-solid fa-lightbulb text-yellow-400 text-[14px] w-4 text-center shrink-0"></i>
        <div>
          <p class="sf-row-title">Enable Hints</p>
        </div>
      </div>
      <div class="sf-seg">
        <button type="button"
                (click)="settingsForm.get('showHint')?.setValue(true)"
                [class]="settingsForm.get('showHint')?.value === true
                  ? 'px-4 py-1.5 font-bold text-white bg-emerald-500 transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          Yes
        </button>
        <button type="button"
                (click)="settingsForm.get('showHint')?.setValue(false)"
                [class]="settingsForm.get('showHint')?.value === false
                  ? 'px-4 py-1.5 font-bold text-white bg-cm-brand transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          No
        </button>
      </div>
    </div>

    <!-- Show Answer -->
    <div class="sf-row">
      <div class="sf-row-label">
        <i class="fa-solid fa-eye text-sky-400 text-[14px] w-4 text-center shrink-0"></i>
        <div>
          <p class="sf-row-title">Show Answer</p>
        </div>
      </div>
      <div class="sf-seg">
        <button type="button"
                (click)="settingsForm.get('showAnswers')?.setValue(true)"
                [class]="settingsForm.get('showAnswers')?.value === true
                  ? 'px-4 py-1.5 font-bold text-white bg-emerald-500 transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          Yes
        </button>
        <button type="button"
                (click)="settingsForm.get('showAnswers')?.setValue(false)"
                [class]="settingsForm.get('showAnswers')?.value === false
                  ? 'px-4 py-1.5 font-bold text-white bg-cm-brand transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          No
        </button>
      </div>
    </div>

    <!-- Enable Navigation -->
    <div class="sf-row">
      <div class="sf-row-label">
        <i class="fa-solid fa-arrows-left-right text-violet-400 text-[14px] w-4 text-center shrink-0"></i>
        <div>
          <p class="sf-row-title">Enable Navigation</p>
        </div>
      </div>
      <div class="sf-seg">
        <button type="button"
                (click)="settingsForm.get('enableNavigation')?.setValue(true)"
                [class]="settingsForm.get('enableNavigation')?.value === true
                  ? 'px-4 py-1.5 font-bold text-white bg-cm-brand transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          ON
        </button>
        <button type="button"
                (click)="settingsForm.get('enableNavigation')?.setValue(false)"
                [class]="settingsForm.get('enableNavigation')?.value === false
                  ? 'px-4 py-1.5 font-bold text-white bg-rose-500 transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          OFF
        </button>
      </div>
    </div>

    <!-- Enable Audio -->
    <div class="sf-row">
      <div class="sf-row-label">
        <i class="fa-solid fa-volume-high text-cyan-400 text-[14px] w-4 text-center shrink-0"></i>
        <div>
          <p class="sf-row-title">Enable Audio</p>
        </div>
      </div>
      <div class="sf-seg">
        <button type="button"
                (click)="settingsForm.get('enableAudio')?.setValue(true)"
                [class]="settingsForm.get('enableAudio')?.value === true
                  ? 'px-4 py-1.5 font-bold text-white bg-cm-brand transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          ON
        </button>
        <button type="button"
                (click)="settingsForm.get('enableAudio')?.setValue(false)"
                [class]="settingsForm.get('enableAudio')?.value === false
                  ? 'px-4 py-1.5 font-bold text-white bg-rose-500 transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          OFF
        </button>
      </div>
    </div>

    <!-- Enable Timer -->
    <div class="sf-row">
      <div class="sf-row-label">
        <i class="fa-solid fa-stopwatch text-orange-400 text-[14px] w-4 text-center shrink-0"></i>
        <div>
          <p class="sf-row-title">Enable Timer</p>
        </div>
      </div>
      <div class="sf-seg">
        <button type="button"
                (click)="settingsForm.get('enableTimer')?.setValue(true)"
                [class]="settingsForm.get('enableTimer')?.value === true
                  ? 'px-4 py-1.5 font-bold text-white bg-cm-brand transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          ON
        </button>
        <button type="button"
                (click)="settingsForm.get('enableTimer')?.setValue(false)"
                [class]="settingsForm.get('enableTimer')?.value === false
                  ? 'px-4 py-1.5 font-bold text-white bg-rose-500 transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          OFF
        </button>
      </div>
    </div>

    <!-- Enable Review -->
    <div class="sf-row">
      <div class="sf-row-label">
        <i class="fa-solid fa-clipboard-check text-emerald-400 text-[14px] w-4 text-center shrink-0"></i>
        <div>
          <p class="sf-row-title">Enable Review</p>
        </div>
      </div>
      <div class="sf-seg">
        <button type="button"
                (click)="settingsForm.get('enableReview')?.setValue(true)"
                [class]="settingsForm.get('enableReview')?.value === true
                  ? 'px-4 py-1.5 font-bold text-white bg-cm-brand transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          ON
        </button>
        <button type="button"
                (click)="settingsForm.get('enableReview')?.setValue(false)"
                [class]="settingsForm.get('enableReview')?.value === false
                  ? 'px-4 py-1.5 font-bold text-white bg-rose-500 transition-colors'
                  : 'px-4 py-1.5 font-medium text-cm-text-secondary hover:bg-cm-surface-hover transition-colors'">
          OFF
        </button>
      </div>
    </div>

  </div>

</form>
