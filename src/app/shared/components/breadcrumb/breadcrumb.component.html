<div class="flex flex-row items-center justify-between gap-3 w-full">

  <div class="min-w-0 flex-1">
    <h4 class="text-base sm:text-lg font-bold text-cm-text-primary leading-tight truncate">{{ title }}</h4>
    @if ((items && items.length > 0) || active_item) {
    <nav class="flex flex-wrap items-center gap-x-1.5 gap-y-1 mt-1" aria-label="Breadcrumb">
      @for (item of items; track item) {
      <span class="text-xs font-medium text-cm-text-secondary">{{ item }}</span>
      <span class="text-xs text-cm-text-muted">/</span>
      }
      @if (active_item) {
      <span class="text-xs font-semibold text-cm-brand-text">{{ active_item }}</span>
      }
    </nav>
    }
  </div>

  <!-- Right-side CTA slot — pages project buttons/links here (e.g. "List Users").
       Always stays in-row and right-aligned, mobile included — the left side
       (title/breadcrumb) shrinks and truncates/wraps instead of pushing this down. -->
  <div class="flex items-center gap-2 shrink-0">
    <ng-content></ng-content>
  </div>

</div>
