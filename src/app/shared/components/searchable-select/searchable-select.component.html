<div class="relative">

  <!-- Trigger -->
  <button type="button" [disabled]="disabled" (click)="toggle()" (keydown.escape)="close()"
    [class]="'w-full box-border flex items-center gap-2.5 px-3 py-2.5 rounded-xl border text-sm text-left transition-all disabled:opacity-50 disabled:cursor-not-allowed ' +
      (hasValue
        ? 'bg-cm-brand-dim border-cm-brand text-cm-brand-text font-medium'
        : 'bg-cm-surface-muted border-cm-border text-cm-text-secondary hover:border-cm-border-strong')">
    <span class="flex-1 min-w-0 truncate">{{ loading ? 'Loading…' : triggerLabel }}</span>
    <svg class="w-3.5 h-3.5 shrink-0 text-cm-text-muted transition-transform duration-200"
         [style.transform]="isOpen ? 'rotate(180deg)' : 'none'"
         fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>

  <!-- Panel -->
  @if (isOpen) {
  <div class="absolute z-20 mt-1.5 w-full rounded-xl border border-cm-border bg-cm-surface shadow-lg overflow-hidden"
       (click)="$event.stopPropagation()" (keydown.escape)="close()">

    <div class="flex items-center gap-2 px-3 py-2.5 border-b border-cm-border bg-cm-surface-muted">
      <svg class="w-3.5 h-3.5 shrink-0 text-cm-text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/>
      </svg>
      <input #searchInput type="text" [(ngModel)]="search" [placeholder]="searchPlaceholder" autocomplete="off"
             class="flex-1 min-w-0 bg-transparent text-sm text-cm-text-primary outline-none placeholder:text-cm-text-muted">
    </div>

    <div class="max-h-56 overflow-y-auto overscroll-contain">
      @if (filteredOptions.length === 0) {
      <div class="px-3 py-5 text-center">
        <p class="text-xs text-cm-text-muted italic">
          {{ options.length === 0 ? emptyText : ('No results for "' + search + '"') }}
        </p>
      </div>
      } @else {
      @for (grp of groupedOptions; track grp.group) {
        @if (grp.group) {
        <div class="px-3 pt-2.5 pb-1 text-[10px] font-bold uppercase tracking-wide text-cm-text-muted">
          {{ grp.group }}
        </div>
        }
        @for (opt of grp.options; track opt.id) {
        <button type="button" (click)="selectOption(opt)"
          [class]="'w-full box-border flex items-center gap-2.5 px-3 py-2.5 text-left text-sm transition-colors ' +
            (isSelected(opt.id) ? 'bg-cm-brand-dim text-cm-brand-text font-medium' : 'text-cm-text-primary hover:bg-cm-surface-hover')">
          @if (multiple) {
          <span [class]="'shrink-0 w-4 h-4 rounded flex items-center justify-center border transition-colors ' +
              (isSelected(opt.id) ? 'bg-cm-brand border-cm-brand' : 'border-cm-border-strong')">
            @if (isSelected(opt.id)) {
            <svg class="w-2.5 h-2.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
            }
          </span>
          }
          <span class="flex-1 min-w-0 truncate">{{ opt.label }}</span>
          @if (!multiple && isSelected(opt.id)) {
          <svg class="w-3.5 h-3.5 shrink-0 text-cm-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
          }
        </button>
        }
      }
      }
    </div>

  </div>
  }

</div>
