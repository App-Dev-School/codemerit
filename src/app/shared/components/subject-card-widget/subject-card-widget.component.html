<div class="rounded-xl border border-cm-border bg-cm-surface p-4 hover:bg-cm-surface-hover transition-colors">
  <p class="text-sm font-semibold text-cm-text-primary mb-3">{{ title }}</p>
  <div class="grid grid-cols-3 gap-2 mb-4">
    <div class="text-center">
      <p class="text-xs text-cm-text-muted mb-0.5">Topics</p>
      <p class="text-lg font-bold text-cm-text-primary">{{ topicsCount }}</p>
    </div>
    <div class="text-center">
      <p class="text-xs text-cm-text-muted mb-0.5">Questions</p>
      <p class="text-lg font-bold text-cm-text-primary">{{ questionsCount }}</p>
    </div>
    <div class="text-center">
      <p class="text-xs text-cm-text-muted mb-0.5">Lessons</p>
      <p class="text-lg font-bold text-cm-text-primary">{{ lessonCount }}</p>
    </div>
  </div>
  <div class="w-full h-1.5 bg-cm-surface-raised rounded-full overflow-hidden">
    <div class="h-full rounded-full transition-all duration-500"
         [style.width]="progressPercentage + '%'"
         [style.backgroundColor]="progressColor"></div>
  </div>
  <p class="text-xs text-cm-text-muted mt-1.5">{{ progressPercentage }}% progress</p>
</div>
