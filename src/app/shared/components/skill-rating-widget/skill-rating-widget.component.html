<ul class="list-unstyled user-progress list-unstyled-border list-unstyled-noborder">
  @for (skillRating of skillRatings(); track skillRating) {
  <li class="lecture-list">
    <img alt="image" class="msr-3 rounded-circle" width="40" [src]="skillRating.imageUrl">
    <div class="">
      <div class="media-title font-16 font-b-500">{{ skillRating.skillName }}</div>
      <div class="text-job text-muted mb-0 font-12">Rating: {{ skillRating.rating }}/5</div>
      <ng-container >
        <mat-icon color="warn">star</mat-icon>
        <mat-icon color="warn">star</mat-icon>
        <mat-icon color="warn">star</mat-icon>
        <mat-icon color="warn">star</mat-icon>
        <mat-icon color="warn">star</mat-icon>
      </ng-container>
    </div>
    <div class="ms-auto">
      <div class="media-title font-14 font-b-500">{{ skillRating.level }}</div>
      <div class="text-job text-muted mb-0 font-12">{{ skillRating.grade }}</div>
    </div>
  </li>
  }
</ul>
