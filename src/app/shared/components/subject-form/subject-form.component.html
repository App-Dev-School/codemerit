<div class="rounded-2xl border border-cm-border bg-cm-surface p-5">
  <h2 class="text-base font-bold text-cm-text-primary mb-5">Add New Subject</h2>

  <form [formGroup]="subjectForm" (ngSubmit)="onSubjectFormSubmit()">

    <!-- Name + Level row -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-xs font-medium text-cm-text-secondary mb-1.5">
          Subject Name <span class="text-cm-danger-text">*</span>
        </label>
        <input formControlName="title" type="text" placeholder="Name of the subject"
          class="w-full px-3 py-2.5 rounded-xl border border-cm-border bg-cm-surface-muted
                 text-sm text-cm-text-primary placeholder:text-cm-text-muted outline-none
                 focus:border-cm-brand focus:ring-1 focus:ring-cm-brand/30 transition-colors">
        @if (subjectForm.get('title')?.touched && subjectForm.get('title')?.hasError('minLength')) {
        <p class="text-xs text-cm-danger-text mt-1">Subject name is too short</p>
        }
      </div>

      <div>
        <label class="block text-xs font-medium text-cm-text-secondary mb-1.5">Level</label>
        <select formControlName="label"
          class="w-full px-3 py-2.5 rounded-xl border border-cm-border bg-cm-surface-muted
                 text-sm text-cm-text-primary outline-none
                 focus:border-cm-brand focus:ring-1 focus:ring-cm-brand/30 transition-colors">
          <option value="">Select level</option>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>
      </div>
    </div>

    <!-- Description -->
    <div class="mb-4">
      <label class="block text-xs font-medium text-cm-text-secondary mb-1.5">
        Description <span class="text-cm-danger-text">*</span>
      </label>
      <textarea formControlName="description" rows="3" placeholder="Short description of subject"
        class="w-full px-3 py-2.5 rounded-xl border border-cm-border bg-cm-surface-muted
               text-sm text-cm-text-primary placeholder:text-cm-text-muted outline-none resize-none
               focus:border-cm-brand focus:ring-1 focus:ring-cm-brand/30 transition-colors"></textarea>
    </div>

    <!-- Published toggle -->
    <div class="mb-5">
      <label class="inline-flex items-center gap-2.5 cursor-pointer select-none">
        <input type="checkbox" formControlName="is_published"
          class="w-4 h-4 rounded border-cm-border text-cm-brand accent-cm-brand cursor-pointer">
        <span class="text-xs text-cm-text-secondary">Make this subject available</span>
      </label>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3">
      <button type="submit" [disabled]="!subjectForm.valid"
        class="inline-flex items-center px-5 py-2.5 rounded-xl bg-cm-brand text-white text-sm font-semibold
               hover:opacity-90 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
        Submit
      </button>
      <button type="button" (click)="subjectForm.reset()"
        class="inline-flex items-center px-5 py-2.5 rounded-xl border border-cm-border
               text-sm font-medium text-cm-text-secondary bg-cm-surface-muted
               hover:border-cm-danger/40 hover:text-cm-danger-text active:scale-95 transition-all">
        Cancel
      </button>
    </div>

  </form>
</div>
