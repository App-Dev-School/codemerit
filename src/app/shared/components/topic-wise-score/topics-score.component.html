<ul class="list-unstyled">
  @for (source of topicScores; track source) {
  <li>
    <div class="mb-2">
      <span class="progress-label">{{ source.title }}</span>
      <span class="float-end progress-percent label m-b-5 text-white" [ngClass]="'label-primary'">{{ source.coverage
        }}%</span>
    </div>
    <div class="progress skill-progress m-b-20 w-100">
      <div class="progress-bar" [ngClass]="'label-primary'" [style.width]="source.coverage + '%'" role="progressbar"
        [attr.aria-valuenow]="source.coverage" aria-valuemin="0" aria-valuemax="100"></div>
    </div>
    <hr class="dim-divider">
  </li>
  }
</ul>
