<ul class="list-none p-0 space-y-4">
  @for (source of topicScores; track source) {
  <li>
    <div class="flex items-center justify-between mb-1.5">
      <span class="text-xs font-medium text-cm-text-secondary">{{ source.title }}</span>
      <span class="text-xs font-bold text-cm-brand px-1.5 py-0.5 rounded bg-cm-brand-dim">{{ source.coverage }}%</span>
    </div>
    <div class="w-full h-1.5 bg-cm-surface-raised rounded-full overflow-hidden">
      <div class="h-full bg-cm-brand rounded-full transition-all duration-500"
           [style.width]="source.coverage + '%'"></div>
    </div>
    <hr class="dim-divider mt-3">
  </li>
  }
</ul>
