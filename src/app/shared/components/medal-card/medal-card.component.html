<div class="card hoverCard card-congratulation-medal">
  <div class="card-body text-center">
    <img src="assets/images/icons/badge.svg" class="congratulation-medal text-center" alt="UpSkillr Medal" />
    <h5 class="text-center cmSubHeading m-t-10 m-b-5">{{title}}</h5>
    <!-- <h5 class="m-t-20 font-11 text-center">{{message()}}</h5> -->
    <!-- <h5 class="card-text m-t-20 font-14 text-center">Rate your confidence across the technologies you have learnt ⭐</h5> -->
    <div class="star-rating auto-animate">
      <span class="star rating"> ★ </span>
      <span class="star rating"> ★ </span>
      <span class="star rating"> ★ </span>
      <span class="star rating"> ★ </span>
      <span class="star rating"> ★ </span>
    </div>

    <h5 class="card-text m-t-0 font-14 text-center">
      Discover your strengths, uncover gaps, and unlock a guided roadmap to certification and career readiness.</h5>
    <hr class="dim-divider">
    @if (action === 'takeQuiz') {
    <button mat-flat-button color="warn" (click)="handleAction()"><mat-icon>keyboard_arrow_left</mat-icon>
      Assess My Skill</button>
    }
    @if (action === 'login') {
    <button mat-flat-button color="warn" (click)="handleAction()">
      Sign Up / Login <mat-icon>keyboard_arrow_right</mat-icon></button>
    }
    @if (action === 'selfRating') {
    <button mat-flat-button color="warn" (click)="handleAction()" rippleEffect>
      <mat-icon>assignment</mat-icon>Start with Self Evaluation</button>
    }
    <!-- <hr class="dim-divider">
    <button  mat-flat-button color="warn" (click)="action='subjectRating';handleAction()" rippleEffect>
      <mat-icon>keyboard_arrow_right</mat-icon> Subject Completetion Agreement</button>
  </div> -->
  </div>
</div>
