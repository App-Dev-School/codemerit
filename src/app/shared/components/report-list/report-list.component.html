<div>
  <!-- Tab nav -->
  <div class="flex gap-1 mb-4 border-b border-cm-border overflow-x-auto">
    @for (role of roles; track role.id; let i = $index) {
    <button type="button" (click)="selected.setValue(i)"
      class="shrink-0 px-4 py-2.5 text-xs font-semibold border-b-2 transition-colors"
      [class]="selected.value === i
        ? 'border-cm-brand text-cm-brand'
        : 'border-transparent text-cm-text-secondary hover:text-cm-text-primary hover:border-cm-border'">
      {{ role.title }}
    </button>
    }
  </div>

  <!-- Tab panels -->
  @for (role of roles; track role.id; let i = $index) {
  @if (selected.value === i) {
  <div>
    <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 mt-2">
      @for (subject of role.subjects; track subject.id) {
      <div (click)="switchSubject(subject.title)"
        class="rounded-xl border border-cm-border bg-cm-surface p-4 cursor-pointer
               hover:bg-cm-surface-hover hover:border-cm-brand/30 hover:shadow-sm
               active:scale-95 transition-all text-center">
        <img [src]="subject.image || 'assets/images/tech/placeholder.png'" [alt]="subject.title"
          class="w-12 h-12 object-contain mx-auto mb-2 rounded-lg">
        <p class="text-xs font-semibold text-cm-text-primary leading-snug">{{ subject.title }}</p>
      </div>
      }
    </div>

    <hr class="dim-divider my-4">

    <div class="text-center">
      <a [routerLink]="['/assessment/skill-rating', role.slug]"
        class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold
               bg-cm-brand text-white hover:opacity-90 active:scale-95 transition-all">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
        </svg>
        Rate Skills as {{ role.title }}
      </a>
    </div>
  </div>
  }
  }
</div>
