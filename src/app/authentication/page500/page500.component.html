<app-particle-canvas />

<div class="error-page">
  <div class="error-card">

    <div class="error-code">
      <span class="text-gradient">500</span>
    </div>

    <div class="error-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
      </svg>
    </div>

    <h1 class="error-title">Something Went Wrong</h1>
    <p class="error-subtitle">
      An unexpected error occurred on our end. Please try again in a moment.
    </p>

    <a routerLink="/app/welcome" class="action-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      </svg>
      Try Again
    </a>

    <div class="help-wrap">
      <a routerLink="/authentication/signin" class="help-link">Need help? Sign in</a>
    </div>

  </div>
</div>
