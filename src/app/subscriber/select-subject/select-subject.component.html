@if(showContent){
@if(isLoading){
<div class="overlay"></div>
<div class="animToast loading">
  <img src="assets/images/icons/loading.gif" class="miniLoadingIcon">
  <h4 class="cmSubHeading">Loading Subjects</h4>
  <h5 class="font-14">Please wait</h5>
</div>
}@else {
<section class="fullScreen" [@slideInOut]>
   <button (click)="onCancel()" aria-label="Cancel" style="position: absolute; top: 16px; right: 16px; background: transparent; border: none; cursor: pointer; z-index: 10;">
       <mat-icon class="sidebar-icon">close</mat-icon>
    </button>
  <div class="container">
    <div class="row m-t-10 m-b-10 clearfix">
      <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <h3 class="text-center cmHeading m-t-10">Select a Skill</h3>
      </div>
    </div>

    <div class="row m-t-10 clearfix">
      <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <app-my-subjects [subjects]="subjects" (subjectSelected)="onSubjectChange($event)"
          (onSubscribe)="onSubscribe($event)"></app-my-subjects>
      </div>
    </div>
  </div>
</section>
}
}
