@if(showContent){
  @if(isLoading){
    <div class="fixed inset-0 bg-black/50 z-[1000]"></div>
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[1001]
                bg-cm-surface rounded-2xl px-10 py-6 text-center
                border border-cm-border shadow-2xl min-w-[200px]">
      <img src="assets/images/icons/loading.gif" class="w-[50px] mx-auto">
      <h4 class="text-[17px] font-medium text-cm-text-primary mt-2">Loading Subjects</h4>
      <p class="text-sm text-cm-text-secondary mt-0.5">Please wait</p>
    </div>
  } @else {
    <section class="mx-[15px] mt-[15px] relative" [@slideInOut]>
      <button (click)="onCancel()" aria-label="Cancel"
              class="absolute top-4 right-4 flex items-center justify-center w-8 h-8 rounded-full
                     bg-transparent border-none cursor-pointer z-10
                     text-cm-text-muted hover:text-cm-text-primary hover:bg-cm-surface-raised
                     transition-colors">
        <mat-icon>close</mat-icon>
      </button>

      <div class="relative mt-4">
        <h3 class="text-center text-xl font-black text-cm-text-primary tracking-tight mt-[10px] mb-[10px]">
          Select a Skill
        </h3>

        <div class="mt-[10px]">
          <app-my-subjects
            [subjects]="subjects"
            (subjectSelected)="onSubjectChange($event)"
            (onSubscribe)="onSubscribe($event)">
          </app-my-subjects>
        </div>
      </div>
    </section>
  }
}
