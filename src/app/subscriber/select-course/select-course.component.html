@if (showContent) {

  <!-- ── Fullscreen overlay ─────────────────────────────────────────── -->
  <div class="select-overlay" [@overlayFade] (click)="onCancel()">

    <!-- Loading state -->
    @if (isLoading) {
      <div class="select-loading" (click)="$event.stopPropagation()">
        <img src="assets/images/icons/loading.gif" class="w-12 mx-auto">
        <p class="mt-3 text-sm font-medium text-slate-300">Loading Job Roles…</p>
      </div>
    }

    <!-- Content panel -->
    @if (!isLoading) {
      <div class="select-panel" [@panelSlide] (click)="$event.stopPropagation()">

        <!-- Panel header -->
        <div class="select-panel__header">
          <div>
            <h2 class="select-panel__title">Choose your Job Role</h2>
            <p class="select-panel__subtitle">
              Select a role to personalise your learning path and unlock relevant assessments.
            </p>
          </div>
          <button class="select-close" (click)="onCancel()" aria-label="Close">
            <mat-icon>close</mat-icon>
          </button>
        </div>

        <!-- Course picker -->
        <div class="select-panel__body">
          <app-course-picker
            [minimal]="true"
            [currentCourses]="userJobRoles"
            [actionMode]="actionMode"
            (subjectSelected)="onCourseChange($event)">
          </app-course-picker>
        </div>

      </div>
    }
  </div>

}
