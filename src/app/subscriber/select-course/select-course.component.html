<app-course-picker
  [open]="open"
  [minimal]="true"
  [currentCourses]="userJobRoles"
  [actionMode]="actionMode"
  title="Choose your Job Role"
  subtitle="Select a role to personalise your learning path and unlock relevant assessments."
  (subjectSelected)="onCourseChange($event)"
  (closed)="onCancel()">
</app-course-picker>
