@if(showContent){
<section class="content" [@topToBottom]>
  <div class="content-block">
    <div class="row m-t-20 clearfix">
      <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <h6 class="text-center font-20 m-t-10">Select a <span style="font-size:1.5rem;color:rgb(16, 16, 161);">Job Role
          </span> or <span style="font-size:1.5rem;color:rgb(151, 123, 22);"><mat-icon>flight_takeoff</mat-icon></span>
          <span style="font-size:1.5rem;color:rgb(161, 114, 13);">Designation</span></h6>
        <hr class="dim-divider">
      </div>
    </div>
    <app-course-picker [minimal]="true" [currentCourses]="userJobRoles" [actionMode]="actionMode"
      (subjectSelected)="onCourseChange($event)"></app-course-picker>
  </div>
</section>
}
