<section class="content">
  <div class="content-block p-t-20">
    <div class="rounded-2xl border border-cm-border bg-cm-surface shadow-sm overflow-hidden">

      <!-- Card header -->
      <div class="px-6 py-5 border-b border-cm-border">
        <h2 class="text-base font-black text-cm-text-primary">Create Lesson</h2>
        <p class="text-xs text-cm-text-muted mt-0.5">Fill in the details to publish a new lesson</p>
      </div>

      <!-- Form -->
      <form [formGroup]="lessonForm" (ngSubmit)="submit()" class="p-6 space-y-5">

        <!-- Title -->
        <div>
          <label class="block text-xs font-semibold text-cm-text-secondary mb-1.5">
            Title <span class="text-cm-danger-text">*</span>
          </label>
          <input type="text" formControlName="title" placeholder="Enter lesson title"
            class="w-full px-3 py-2.5 rounded-xl border border-cm-border bg-cm-surface-muted
                   text-sm text-cm-text-primary placeholder-cm-text-muted
                   focus:outline-none focus:ring-2 focus:ring-cm-brand-ring focus:border-cm-brand transition-colors">
        </div>

        <!-- Subject -->
        <div>
          <label class="block text-xs font-semibold text-cm-text-secondary mb-1.5">
            Subject <span class="text-cm-danger-text">*</span>
          </label>
          <select formControlName="subject" (change)="onSubjectChange($any($event.target).value)"
            class="w-full px-3 py-2.5 rounded-xl border border-cm-border bg-cm-surface-muted
                   text-sm text-cm-text-primary focus:outline-none focus:ring-2 focus:ring-cm-brand-ring
                   focus:border-cm-brand transition-colors appearance-none">
            <option value="" disabled selected>Select subject</option>
            @for (subject of subjects; track subject.id) {
            <option [value]="subject.id">{{ subject.title }}</option>
            }
          </select>
        </div>

        <!-- Topic -->
        <div>
          <label class="block text-xs font-semibold text-cm-text-secondary mb-1.5">
            Topic <span class="text-cm-danger-text">*</span>
          </label>
          <select formControlName="topic"
            class="w-full px-3 py-2.5 rounded-xl border border-cm-border bg-cm-surface-muted
                   text-sm text-cm-text-primary focus:outline-none focus:ring-2 focus:ring-cm-brand-ring
                   focus:border-cm-brand transition-colors appearance-none">
            <option value="" disabled selected>Select topic</option>
            @for (topic of filteredTopics; track topic.id) {
            <option [value]="topic.id">{{ topic.title }}</option>
            }
          </select>
        </div>

        <!-- Level -->
        <div>
          <label class="block text-xs font-semibold text-cm-text-secondary mb-1.5">
            Level <span class="text-cm-danger-text">*</span>
          </label>
          <select formControlName="level"
            class="w-full px-3 py-2.5 rounded-xl border border-cm-border bg-cm-surface-muted
                   text-sm text-cm-text-primary focus:outline-none focus:ring-2 focus:ring-cm-brand-ring
                   focus:border-cm-brand transition-colors appearance-none">
            <option value="" disabled selected>Select level</option>
            @for (option of difficultyOptions; track option.value) {
            <option [value]="option.value">{{ option.label }}</option>
            }
          </select>
        </div>

        <!-- Descriptions -->
        <div formArrayName="descriptions">
          <div class="flex items-center justify-between mb-2">
            <label class="text-xs font-semibold text-cm-text-secondary">Description</label>
            <button type="button" (click)="addDescription()"
              class="w-7 h-7 rounded-full bg-cm-brand text-white flex items-center justify-center
                     hover:opacity-90 active:scale-95 transition-all">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
              </svg>
            </button>
          </div>

          @for (description of descriptions.controls; track $index) {
          <div class="description-row mb-3">
            <div class="description-editor flex-1">
              <label class="block text-xs text-cm-text-muted mb-1">
                Description {{ $index + 1 }}{{ $index === 0 ? ' *' : '' }}
              </label>
              <div class="tiptap-mat-wrapper rounded-xl border border-cm-border bg-cm-surface-muted overflow-hidden">
                <tiptap-editor [editor]="descriptionEditors[$index]" class="tiptap-mat-textarea"></tiptap-editor>
              </div>
              @if (description.invalid && (description.touched || submitted)) {
              <p class="text-xs text-cm-danger-text mt-1">Description is required</p>
              }
            </div>
            @if (descriptions.length > 1) {
            <button type="button" (click)="removeDescription($index)"
              class="mt-2 w-7 h-7 rounded-lg border border-cm-danger/30 text-cm-danger-text flex items-center justify-center
                     hover:bg-cm-danger-dim active:scale-95 transition-all">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
            }
          </div>
          }
        </div>

        <!-- Submit -->
        <div class="pt-2">
          <button type="submit" [disabled]="lessonForm.invalid"
            class="px-6 py-2.5 rounded-xl bg-cm-brand text-white text-sm font-semibold
                   hover:opacity-90 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
            Create Lesson
          </button>
        </div>

      </form>
    </div>
  </div>
</section>
