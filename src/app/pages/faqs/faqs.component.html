<section class="content">
  <div class="content-block">
    <div class="block-header">
      <app-breadcrumb [title]="'FAQs'" [items]="['Extra']" [active_item]="'FAQs'"></app-breadcrumb>
    </div>

    <div class="rounded-2xl border border-cm-border bg-cm-surface shadow-sm p-4 sm:p-6 mt-2">
      <h4 class="text-base font-bold text-cm-text-primary mb-1">Frequently Asked Questions</h4>
      <p class="text-xs text-cm-text-muted mb-5">Everything you need to know about SkillUp LMS</p>
      <hr class="border-cm-border mb-5">

      @if (faqs.length > 0) {
      <div class="space-y-2">
        @for (item of faqs; track item.id) {
        <details class="group rounded-xl border border-cm-border bg-cm-surface-muted overflow-hidden">
          <summary class="flex items-center justify-between gap-3 px-4 py-3.5 cursor-pointer list-none
                          hover:bg-cm-surface-hover transition-colors select-none">
            <span class="text-sm font-medium text-cm-text-primary leading-snug">{{ item.question }}</span>
            <svg class="w-4 h-4 text-cm-text-muted shrink-0 transition-transform duration-200
                        group-open:rotate-180"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </summary>
          <div class="px-4 pb-4 pt-1">
            <p class="text-xs text-cm-text-secondary leading-relaxed border-t border-cm-border pt-3">
              {{ item.answer }}
            </p>
          </div>
        </details>
        }
      </div>
      }
    </div>
  </div>
</section>
