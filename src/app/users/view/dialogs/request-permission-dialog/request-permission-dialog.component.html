<div class="p-1 min-w-[320px] max-w-[400px]">
  <div mat-dialog-content class="mb-5">
    <div class="flex items-start gap-3 mb-4">
      <div class="w-10 h-10 rounded-full bg-cm-brand-dim flex items-center justify-center shrink-0 mt-0.5">
        <svg class="w-5 h-5 text-cm-brand-text" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <div>
        <h4 class="text-sm font-bold text-cm-text-primary mb-1">Request Permission</h4>
        <p class="text-xs text-cm-text-secondary leading-relaxed">
          Requesting <strong class="text-cm-text-primary">{{ data.permission.permission }}</strong>.
          An admin will review this before it's granted.
        </p>
        @if (data.permission.description) {
        <p class="text-[11px] text-cm-text-muted mt-1">{{ data.permission.description }}</p>
        }
      </div>
    </div>

    <label class="block text-xs font-semibold text-cm-text-secondary mb-1.5">
      Why do you need this? <span class="text-cm-danger-text">*</span>
    </label>
    <textarea [(ngModel)]="comment" rows="3" maxlength="500"
      class="w-full rounded-xl border border-cm-border bg-cm-surface px-3 py-2 text-xs text-cm-text-primary
             placeholder:text-cm-text-muted outline-none focus:border-cm-brand transition-colors resize-none"
      placeholder="Give the reviewer some context, at least 5 characters.">
    </textarea>
    @if (commentTooShort) {
    <p class="text-[11px] text-cm-danger-text mt-1">At least 5 characters.</p>
    }

    @if (errorMessage) {
    <p class="text-xs text-cm-danger-text mt-2">{{ errorMessage }}</p>
    }
  </div>

  <div mat-dialog-actions class="flex items-center gap-2 justify-end">
    <button mat-dialog-close type="button" [disabled]="submitting"
      class="inline-flex items-center px-4 py-2 rounded-xl border border-cm-border
             text-xs font-medium text-cm-text-secondary bg-cm-surface-muted
             hover:bg-cm-surface-hover active:scale-95 transition-all disabled:opacity-50">
      Cancel
    </button>
    <button type="button" (click)="submit()" [disabled]="!canSubmit"
      class="inline-flex items-center gap-1.5 px-4 py-2 rounded-xl bg-cm-brand text-white
             text-xs font-semibold hover:opacity-90 active:scale-95 transition-all disabled:opacity-50">
      {{ submitting ? 'Submitting…' : 'Submit Request' }}
    </button>
  </div>
</div>
