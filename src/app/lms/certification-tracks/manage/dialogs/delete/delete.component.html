<div class="p-1 min-w-[320px]">
  <div mat-dialog-content class="mb-5">
    <div class="flex items-start gap-3">
      <div class="w-10 h-10 rounded-full bg-red-500/15 flex items-center justify-center shrink-0 mt-0.5">
        <svg class="w-5 h-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </div>
      <div>
        <h4 class="text-sm font-bold text-cm-text-primary mb-1">Delete Certification Track</h4>
        <p class="text-xs text-cm-text-secondary leading-relaxed">
          Are you sure you want to permanently delete
          <strong class="text-cm-text-primary">{{ data?.title ?? 'this certification track' }}</strong>?
          All linked subject track associations will also be removed. This action cannot be undone.
        </p>
      </div>
    </div>
  </div>
  <div mat-dialog-actions class="flex items-center gap-2 justify-end">
    <button
      mat-dialog-close
      type="button"
      class="inline-flex items-center px-4 py-2 rounded-xl border border-cm-border
             text-xs font-medium text-cm-text-secondary bg-cm-surface-muted
             hover:bg-cm-surface-hover active:scale-95 transition-all"
    >
      Cancel
    </button>
    <button
      type="button"
      (click)="confirmDelete()"
      [disabled]="isDeleting"
      class="inline-flex items-center gap-1.5 px-4 py-2 rounded-xl bg-red-500 text-white
             text-xs font-semibold hover:opacity-90 active:scale-95 transition-all
             disabled:opacity-50 disabled:cursor-not-allowed"
    >
      <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
      {{ isDeleting ? 'Deleting…' : 'Delete' }}
    </button>
  </div>
</div>
